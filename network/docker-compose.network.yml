version: "3.9"

services:

  # =========================
  #  APP (NGINX)
  # =========================
  app:
    image: nginx:latest
    container_name: app
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - targets_zone
      - soc_shared
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
# =========================
#  NETWORKS
# =========================
networks:
  # shared communication (สำคัญสุด)
  soc_shared:
    name: soc_shared
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.10.0/24
  # management private (สำหรับบริการที่ต้องการแยกออกจากโซนอื่นๆ)
  soc_mgmt:
    name: soc_mgmt
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.20.0/24
# =========================
#  VOLUMES
# =========================
volumes:
  mongo_data: