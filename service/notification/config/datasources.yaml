apiVersion: 1

datasources:
  - name: InfluxDB-SOC
    type: influxdb
    access: proxy
    url: ${INFLUX_URL}
    jsonData:
      version: Flux
      organization: ${INFLUX_ORG}
      defaultBucket: ${INFLUX_BUCKET}
    secureJsonData:
      token: ${INFLUX_TOKEN}
    isDefault: true

  - name: Prometheus-SOC
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
