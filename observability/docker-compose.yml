services:
  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    networks:
      - soc_shared
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_INIT_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_INIT_PASSWORD:-Asdopoo123!}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_INIT_ORG:-soc}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_INIT_BUCKET:-alerts}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_INIT_ADMIN_TOKEN:-soc-influx-dev-token-change-me}
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8086/health | grep -q 'pass'"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    restart: unless-stopped
    networks:
      - soc_shared
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://host.docker.internal:9200"]'
      XPACK_SECURITY_ENABLED: "false"
      SERVER_NAME: soc-kibana
      TELEMETRY_ENABLED: "false"
      LOGGING_ROOT_LEVEL: warn
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q 'available'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    restart: unless-stopped
    networks:
      - soc_shared
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
      KAFKA_BOOTSTRAP: kafka-broker:29092
      ES_HOST: http://host.docker.internal:9200
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

networks:
  soc_shared:
    external: true

volumes:
  influxdb-data:
  influxdb-config:
