services:
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    restart: unless-stopped
    networks:
      - soc_shared
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://host.docker.internal:9200"]'
      XPACK_SECURITY_ENABLED: "false"
      SERVER_NAME: soc-kibana
      TELEMETRY_ENABLED: "false"
      LOGGING_ROOT_LEVEL: warn
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q 'available'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    restart: unless-stopped
    networks:
      - soc_shared
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
      KAFKA_BOOTSTRAP: kafka-broker:29092
      ES_HOST: http://host.docker.internal:9200
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

networks:
  soc_shared:
    external: true
